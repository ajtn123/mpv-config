[extension.apng]
    loop = yes
    pause = no

[save_position]
    profile-desc = save position
    profile-cond = not (p["current-tracks/video/albumart"] or p["current-tracks/video/image"]) and p.duration>300 and p.percent_pos>10 and p.percent_pos<90
    profile-restore = copy
    save-position-on-quit = yes

[deband]
    profile-desc = deband low bitrate video
    profile-cond = not (p["current-tracks/video/albumart"] or p["current-tracks/video/image"]) and p.file_size/p.duration<250000
    profile-restore = copy
    deband = yes
